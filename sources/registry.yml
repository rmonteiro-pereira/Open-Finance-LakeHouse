  ibge:
    domain: market
    handler: ibge
    indicador: 4099            # PNAD Contínua unemployment rate
    name: "IBGE unemployment rate (PNAD Contínua)"
    category: labor
    unit: percent
    frequency: monthly
    fact: observation
    max_value: 100.0
  anbima:
    domain: market
    handler: anbima           # real Feed API implemented; needs registered credentials
    name: "ANBIMA secondary-market federal bond prices (TPF)"
    category: fixed_income
    unit: mixed
    frequency: daily
    fact: treasury
    # ACTIVE against the ANBIMA *sandbox* (fictitious TPF data, no prod approval needed):
    # the k8s `anbima-creds` secret carries ANBIMA_CLIENT_ID/SECRET + ANBIMA_BASE_URL=
    # https://api-sandbox.anbima.com.br. OAuth still hits the prod host; only the data
    # host is sandbox. For REAL production data, email anbimafeed@anbima.com.br with the
    # client_id, then drop ANBIMA_BASE_URL from the secret (handler defaults to prod).
    status: active

  # ------------------------------------------------------------- equities ----
  yahoo_etf:
    domain: equities
