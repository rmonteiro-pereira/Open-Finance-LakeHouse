# =============================================================================
# Source Registry — the single source of truth for the lakehouse.
#
# Everything is driven from this file: ingestion, Airflow DAG generation,
# the silver `dim_series` dimension, and the OpenMetadata catalog.
#
# Adding a BACEN/SGS series = one entry under `series:`.
# Adding a new KIND of source = one new `handler` in ofl/ingestion/.
#
# Schema (per series):
#   domain     : rates | inflation | fx | fiscal | credit | market | equities
#   handler    : bacen_sgs | bacen_focus | yahoo | tesouro_direto | ipea | b3 | ibge | anbima
#   name       : human label (-> dim_series.name)
#   category   : interest_rate | price_index | exchange_rate | fiscal | ...
#   unit       : percent | percent_per_year | index | brl | brl_million | ...
#   frequency  : daily | monthly | quarterly | annual
#   fact       : observation | security_price | treasury  (target silver fact)
#   <handler-specific keys>:  sgs_id / symbols / dataset_id / ...
#   max_value  : optional sanity bound used by quality contracts
#   start_date : optional ISO floor for the backfill walk (per-series override of
#                a handler default; pre-floor history is simply not ingested)
# =============================================================================
version: 1

defaults:
  table_format: delta
  storage:
    bucket: lakehouse
    layers: { raw: raw, bronze: bronze, silver: silver, gold: gold }
  bacen_sgs:
    base_url: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.{series_id}/dados"
    date_format: "%d/%m/%Y"
    window_years: 10          # SGS caps daily series at ~10y per request
    # Plano Real (1994-07-01): pre-Real BRL series span the cruzeiro/cruzado
    # currency regimes and hyperinflation (>50%/month), which are not comparable
    # to the modern series and trip the quality contracts. Floor every SGS walk
    # here by default; a series may override with its own `start_date`.
    start_date: "1994-07-01"

series:
  # ---------------------------------------------------------------- rates ----
  selic:
    domain: rates
    handler: bacen_sgs
    sgs_id: 11
    name: "SELIC (Over/Selic effective daily rate)"
