  # ------------------------------------------------ market expectations (Focus) --
  # BACEN's weekly Focus survey via the open Olinda OData API (bacen_focus handler).
  # Each series pins one indicator + horizon and lands the survey *median*, so it
  # conforms to fact_observation alongside the realized series (enables ex-ante reads).
  focus_ipca_12m:
    domain: inflation
    handler: bacen_focus
    name: "Focus — IPCA expectation, rolling 12 months (median)"
    category: expectation
    unit: percent
    frequency: weekly
    fact: observation
    max_value: 50.0
    freshness_sla: "10d"
    resource: ExpectativasMercadoInflacao12Meses
    indicador: IPCA
    suavizada: "S"
    base_calculo: 0
    value_field: Mediana
  focus_selic_fim_ano:
    domain: rates
    handler: bacen_focus
    name: "Focus — Selic expectation, end of current year (median)"
    category: expectation
    unit: percent_per_year
    frequency: weekly
    fact: observation
    max_value: 100.0
    freshness_sla: "10d"
    resource: ExpectativasMercadoAnuais
    indicador: Selic
    horizon: current_year
    base_calculo: 0
    value_field: Mediana
  focus_cambio_fim_ano:
    domain: fx
    handler: bacen_focus
    name: "Focus — USD/BRL expectation, end of current year (median)"
    category: expectation
    unit: brl
    frequency: weekly
    fact: observation
    max_value: 20.0
    freshness_sla: "10d"
    resource: ExpectativasMercadoAnuais
    indicador: Câmbio
    horizon: current_year
    base_calculo: 0
    value_field: Mediana

  # --------------------------------------------------------------- market ----
  tesouro_direto:
    domain: market
    handler: tesouro_direto
    name: "Tesouro Direto (prices & yields by bond)"
    category: government_bond
    unit: mixed
    frequency: daily
    fact: treasury
    dataset_id: "df56aa42-484a-4a59-8184-7676580c81e3"
    base_url: "https://www.tesourotransparente.gov.br/ckan/api/3/action"
    bonds:
      - { code: "Tesouro Prefixado 2027",  type: prefixado, maturity: "2027-01-01" }
      - { code: "Tesouro Prefixado 2031",  type: prefixado, maturity: "2031-01-01" }
      - { code: "Tesouro IPCA+ 2029",      type: ipca_plus, maturity: "2029-08-15" }
      - { code: "Tesouro IPCA+ 2035",      type: ipca_plus, maturity: "2035-05-15" }
      - { code: "Tesouro IPCA+ 2045",      type: ipca_plus, maturity: "2045-05-15" }
      - { code: "Tesouro Selic 2027",      type: selic,     maturity: "2027-03-01" }
      - { code: "Tesouro Selic 2029",      type: selic,     maturity: "2029-03-01" }
  b3:
