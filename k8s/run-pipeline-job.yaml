# One-off / templated Job to run a single Kedro pipeline on the cluster.
# Change the pipeline name in args and metadata.name to run a different source.
# Orchestration will later move to the cluster Airflow (KubernetesPodOperator).
apiVersion: batch/v1
kind: Job
metadata:
  name: ofl-selic
  namespace: default
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: kedro
          image: ghcr.io/rmonteiro-pereira/open-finance-lakehouse:cluster
          imagePullPolicy: Always
          args: ["kedro", "run", "--env", "cluster", "--pipeline", "selic"]
          env:
            - name: MINIO_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"
            - name: MINIO_USER
              valueFrom: { secretKeyRef: { name: minio-creds, key: MINIO_USER } }
            - name: MINIO_PASSWORD
              valueFrom: { secretKeyRef: { name: minio-creds, key: MINIO_PASSWORD } }
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits: { cpu: "2", memory: "3Gi" }
